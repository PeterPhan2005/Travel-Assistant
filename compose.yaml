name: travel-assistant

services:
  database:
    image: kartoza/postgis:18.4-3.6.4--v2026.06.21
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-travel_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-travel_assistant}
      POSTGRES_PASS: ${POSTGRES_PASSWORD:-local_dev_only_change_me}
      POSTGRES_MULTIPLE_EXTENSIONS: postgis
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          PGPASSWORD="$${POSTGRES_PASS}"
          pg_isready --host=127.0.0.1 --username="$${POSTGRES_USER}"
          --dbname="$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  postgres_data:
